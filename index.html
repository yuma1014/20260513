<body>

    <nav id="navbar">
        <div class="container nav-content">
            <a href="#" class="logo">三義木雕藝品</a>
            <ul class="nav-links">
                <li><a href="#hero">首頁</a></li>
                <li><a href="#products">館藏藝品</a></li>
                <li><a href="#about">工藝傳承</a></li>
            </ul>
            <div class="cart-icon" onclick="toggleCart()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-badge" id="cart-count">0</span>

        </div>
    </nav>

    <section class="hero" id="hero">
        <div class="hero-content">
            <h1>雕刻時光 · 傳承三義</h1>
            <p>每一寸紋理，都是職人對木頭溫暖的傾訴</p>
            <a href="#products" class="btn">立即探索</a>
        </div>
    </section>

    <section class="container" id="products">
        <div class="section-title"><h2>館藏精選</h2></div>
        <div class="product-grid" id="product-container"></div>
    </section>

    <section class="about" id="about">
        <div class="container" style="display: flex; gap: 50px; align-items: center;">
            <div style="flex: 1;"><img src="https://images.unsplash.com/photo-1590424753245-420d1c7936a2?auto=format&fit=crop&w=800&q=80" alt="木雕工藝"></div>
            <div style="flex: 1;">
                <h2 style="margin-bottom: 20px;">職人精神，始於山林</h2>
                <p>我們堅持選用優質的台灣檜木與樟木，讓大自然的鬼斧神工在職人的雙手中獲得第二次生命。</p>
            </div>
        </div>
    </section>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
            <h3>購物車內容</h3>
            <span style="cursor:pointer" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cart-items-list"></div>
        <div style="margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 20px;">
                <span>總計金額</span>
                <span id="cart-total-amount">NT$ 0</span>
            </div>
            <button class="btn" style="width: 100%;" onclick="checkout()">前往結帳</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 三義木雕藝品. All Rights Reserved.</p>
    </footer>

    <script>
        const products = [
            { id: 1, name: "台灣檜木 · 禪修達摩", price: 18800, img: "https://images.unsplash.com/photo-1594914109433-28952cc6079c?auto=format&fit=crop&w=600&q=80" },
            { id: 2, name: "肖楠木 · 聚寶盆", price: 12500, img: "https://images.unsplash.com/photo-1582266255765-fa5cf1a1d501?auto=format&fit=crop&w=600&q=80" },
            { id: 3, name: "老樟木 · 雲龍戲珠", price: 32000, img: "https://images.unsplash.com/photo-1544413647-b515655bd5bf?auto=format&fit=crop&w=600&q=80" }
        ];

        let cart = [];

        function initProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.img}" alt="${product.name}">
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p style="color: var(--primary-wood); margin: 10px 0;">NT$ ${product.price.toLocaleString()}</p>
                        <button class="btn" onclick="addToCart(${product.id})">加入購物車</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            
            // GA4 事件追蹤：加入購物車
            if (typeof gtag === 'function') {
                gtag('event', 'add_to_cart', {
                    currency: 'TWD',
                    value: product.price,
                    items: [{
                        item_id: product.id.toString(),
                        item_name: product.name,
                        price: product.price
                    }]
                });
            }

            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            let total = 0;
            list.innerHTML = cart.map(item => {
                total += item.price;
                return `<div style="margin-bottom: 10px;">${item.name} - NT$ ${item.price.toLocaleString()}</div>`;
            }).join('');
            document.getElementById('cart-total-amount').innerText = `NT$ ${total.toLocaleString()}`;
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            const overlay = document.getElementById('cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function checkout() {
            // GA4 事件追蹤：開始結帳
            if (typeof gtag === 'function' && cart.length > 0) {
                gtag('event', 'begin_checkout', {
                    currency: 'TWD',
                    value: cart.reduce((sum, item) => sum + item.price, 0),
                    items: cart.map(item => ({ item_id: item.id, item_name: item.name }))
                });
            }
            alert("已觸發結帳事件追蹤（模擬）。");
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            window.scrollY > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
        });

        window.onload = initProducts;
    </script>
</body>
</html>
